// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}


allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
    // Local Maven repos for Expo bundled modules (fallback for EAS Build)
    maven { url "${rootDir}/../node_modules/expo/node_modules/expo-asset/local-maven-repo" }
    maven { url "${rootDir}/../node_modules/expo/node_modules/expo-file-system/local-maven-repo" }
    maven { url "${rootDir}/../node_modules/expo/node_modules/expo-font/local-maven-repo" }
    maven { url "${rootDir}/../node_modules/expo/node_modules/expo-keep-awake/local-maven-repo" }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"
